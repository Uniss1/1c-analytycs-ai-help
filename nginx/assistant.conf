# Nginx config for 1C Analytics AI Help
# Proxies 1C Analytics + injects widget + routes API requests

upstream analytics_backend {
    server 127.0.0.1:8080;  # 1C Analytics
}

upstream assistant_backend {
    server GPU_SERVER_IP:8000;  # FastAPI on GPU server
}

server {
    listen 443 ssl;
    server_name analytics.example.com;

    # SSL certs
    # ssl_certificate /path/to/cert.pem;
    # ssl_certificate_key /path/to/key.pem;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=assistant:10m rate=30r/m;

    # Assistant API
    location /assistant/api/ {
        limit_req zone=assistant burst=5;
        proxy_pass http://assistant_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Widget static files
    location /assistant/widget/ {
        proxy_pass http://assistant_backend/widget/;
    }

    # 1C Analytics — proxy + script injection
    location / {
        proxy_pass http://analytics_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Inject widget script into every HTML page
        sub_filter '</body>' '<script src="/assistant/widget/widget.js"></script></body>';
        sub_filter_once on;
        sub_filter_types text/html;
    }
}
